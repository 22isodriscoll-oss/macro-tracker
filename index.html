<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MACROS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header">
    <div>
      <span class="site-title">MACROS</span>
      <span class="site-date" id="today-date"></span>
    </div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  </header>

  <div class="top-grid">

    <div class="panel remaining-panel">
      <div class="panel-label">Still to hit today</div>
      <div class="macro-row">
        <div class="macro-item">
          <span class="macro-name">Calories</span>
          <span class="macro-val cal" id="rem-cal">—</span>
          <span class="macro-unit">kcal</span>
          <div class="bar-track"><div class="bar-fill cal" id="bar-cal" style="width:0%"></div></div>
        </div>
        <div class="macro-item">
          <span class="macro-name">Carbs</span>
          <span class="macro-val carb" id="rem-carb">—</span>
          <span class="macro-unit">grams</span>
          <div class="bar-track"><div class="bar-fill carb" id="bar-carb" style="width:0%"></div></div>
        </div>
        <div class="macro-item">
          <span class="macro-name">Protein</span>
          <span class="macro-val prot" id="rem-prot">—</span>
          <span class="macro-unit">grams</span>
          <div class="bar-track"><div class="bar-fill prot" id="bar-prot" style="width:0%"></div></div>
        </div>
        <div class="macro-item">
          <span class="macro-name">Fat</span>
          <span class="macro-val fat" id="rem-fat">—</span>
          <span class="macro-unit">grams</span>
          <div class="bar-track"><div class="bar-fill fat" id="bar-fat" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <details class="panel goals-panel">
      <summary>
        <span class="panel-label">Daily goals</span>
        <span class="daily-goals-summary" id="daily-goals-summary">—</span>
      </summary>
      <div class="goals-row">
        <div class="goal-field cal">
          <label>Calories</label>
          <input type="number" id="goal-cal" placeholder="2000" inputmode="decimal" oninput="updateAll()">
        </div>
        <div class="goal-field carb">
          <label>Carbs</label>
          <input type="number" id="goal-carb" placeholder="200" inputmode="decimal" oninput="updateAll()">
        </div>
        <div class="goal-field prot">
          <label>Protein</label>
          <input type="number" id="goal-prot" placeholder="150" inputmode="decimal" oninput="updateAll()">
        </div>
        <div class="goal-field fat">
          <label>Fat</label>
          <input type="number" id="goal-fat" placeholder="65" inputmode="decimal" oninput="updateAll()">
        </div>
      </div>
    </details>

  </div>

  <div class="meals-section" id="meals-container"></div>

  <script src="app.js"></script>
</body>
</html>
